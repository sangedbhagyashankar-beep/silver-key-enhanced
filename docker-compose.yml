version: '3.9'

services:
  mongodb:
    image: mongo:7.0
    container_name: silverkey-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: silverkey
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - silverkey-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: silverkey-api
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/silverkey?authSource=admin
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - silverkey-network
    volumes:
      - ./backend/logs:/home/node/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_RAZORPAY_KEY_ID: ${VITE_RAZORPAY_KEY_ID}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY}
    container_name: silverkey-web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - silverkey-network

volumes:
  mongo_data:

networks:
  silverkey-network:
    driver: bridge
